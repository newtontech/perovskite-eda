# Method Registry — 方法注册表
# AI Agent 从此注册表中加权随机选择方法组合管线
# 权重计算: effective_weight = weight * novelty_factor * availability_factor
#   novelty_factor: 2025-2026 → 3.0, 2023-2024 → 2.0, older → 1.0
#   availability_factor: implemented → 1.5, not → 0.3
# 运行 scripts/update_registry.py 可从网络更新此表

